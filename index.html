<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta property="og:description" content="Pick a mood. Play a video. Work. Still. Boost. Well. Party."/>
  <meta property="og:image" content="https://moods.computer/preview.png"/>

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="moods">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000;
      --white: #fff;
    }

    /* Classic Mac desktop dot pattern */
    body {
      background-color: var(--white);
      background-image: radial-gradient(circle, #000 1px, transparent 1px);
      background-size: 8px 8px;
      font-family: 'VT323', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      padding-bottom: 40px;
    }


    /* ── Window ── */
    .window {
      margin-top: 32px;
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      width: 100%;
      max-width: 680px;
      image-rendering: pixelated;
    }

    /* Classic Mac title bar — horizontal pinstripes */
    .title-bar {
      height: 20px;
      background: repeating-linear-gradient(
        to bottom,
        var(--white) 0px, var(--white) 1px,
        var(--black) 1px, var(--black) 2px
      );
      border-bottom: 2px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    .title-bar-title {
      background: var(--white);
      padding: 0 8px;
      font-size: 13px;
      font-family: 'VT323', 'Monaco', monospace;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .close-box {
      position: absolute;
      left: 6px;
      width: 11px;
      height: 11px;
      border: 1px solid var(--black);
      background: var(--white);
      cursor: pointer;
    }

    .close-box:hover {
      background: var(--black);
    }

    /* ── Window content ── */
    .window-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Mood buttons ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    button {
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow: 2px 2px 0 var(--black);
      color: var(--black);
      font-family: 'VT323', 'Monaco', monospace;
      font-size: 22px;
      letter-spacing: 0.04em;
      padding: 20px 14px 18px;
      cursor: pointer;
      transition: none;
      image-rendering: pixelated;
      text-transform: uppercase;
      text-align: left;
      line-height: 1.3;
    }

    button:hover {
      /* 50% dither pattern for hover state */
      background-image: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%);
      background-size: 2px 2px;
    }

    button:active,
    button.active {
      background: var(--black);
      color: var(--white);
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    /* ── Player window ── */
    .player-window {
      border: 2px solid transparent;
      box-shadow: 4px 4px 0 transparent;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .player-window.show {
      max-height: 640px;
      border-color: var(--black);
      box-shadow: 4px 4px 0 var(--black);
    }

    .player-title-bar {
      height: 18px;
      background: repeating-linear-gradient(
        to bottom,
        var(--white) 0px, var(--white) 1px,
        var(--black) 1px, var(--black) 2px
      );
      border-bottom: 2px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .player-title-bar .close-box {
      left: 5px;
      width: 10px;
      height: 10px;
    }

    .player-title-text {
      background: var(--white);
      padding: 0 6px;
      font-size: 12px;
      font-family: 'VT323', 'Monaco', monospace;
    }

    .player-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--black);
      position: relative;
    }

    #player {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Covers the iframe while a video is loading, so YouTube's transient
       init error/placeholder is never visible */
    .player-loading {
      position: absolute;
      inset: 0;
      background: var(--black);
      z-index: 2;
      opacity: 1;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .player-loading.hidden { opacity: 0; }

    /* ── Status bar ── */
    .status-bar {
      border-top: 2px solid var(--black);
      padding: 4px 10px;
      font-size: 13px;
      font-family: 'VT323', 'Monaco', monospace;
      color: var(--black);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
    }

    /* ── Resize corner ── */
    .resize-corner {
      position: absolute;
      bottom: 0; right: 0;
      width: 12px; height: 12px;
      background: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%);
      background-size: 2px 2px;
    }
    #hint a {
      color: var(--black);
      text-decoration: none;
    }

    #hint a:hover {
      text-decoration: underline;
    }

    .hit-counter {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--black);
      letter-spacing: 0.1em;
    }

    /* Player spans both grid columns when inside the buttons grid */
    .player-window { grid-column: 1 / -1; }

    @media (max-width: 600px) {
      body { padding-top: 12px; padding-bottom: 20px; }
      .window { margin-top: 8px; }
      .window-content { padding: 10px; gap: 8px; }
      button { font-size: 14px; padding: 10px 8px 8px; line-height: 1.2; }
    }
  </style>
</head>
<body>


  <!-- Main window -->
  <div class="window">
    <div class="title-bar">
      <div class="close-box" onclick="location.href='https://ben-schechter.com'"></div>
      <span class="title-bar-title">Moods v1.0</span>
    </div>

    <div class="window-content">

      <div class="buttons" id="buttons">
        <!-- Player lives inside the grid so repositioning never crosses parents (avoids iframe reload) -->
        <div class="player-window" id="playerWrap">
          <div class="player-title-bar">
            <div class="close-box" id="playerClose"></div>
            <span class="player-title-text" id="playerTitle">Now Playing</span>
          </div>
          <div class="player-wrap">
            <div id="player"></div>
            <div class="player-loading" id="playerLoading"></div>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <span id="hint"><a href="https://ben-schechter.com">created by ben schechter</a></span>
        <span class="hit-counter" id="visitCount"></span>
        <span id="clock"></span>
      </div>

    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let MOODS = {};

    fetch('playlists.json')
      .then(r => r.json())
      .then(data => {
        MOODS = data;
        const container = document.getElementById('buttons');
        Object.entries(MOODS).forEach(([mood, val]) => {
          const btn = document.createElement('button');
          btn.dataset.mood = mood;
          btn.textContent = val.label;
          btn.addEventListener('click', () => onMoodClick(mood, btn));
          container.appendChild(btn);
        });
        tryPrime();
      });

    // Visitor counter
    fetch('https://api.counterapi.dev/v1/moods-computer/visits/up')
      .then(r => r.json())
      .then(d => {
        const n = d.count + 696;
        document.getElementById('visitCount').textContent =
          'visitor count ' + String(n).padStart(6, '0');
      })
      .catch(() => {});

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Screen wake lock — keeps phone screen on while playing
    let wakeLock = null;

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
      }
    }

    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }

    // Re-acquire wake lock if page becomes visible again while playing
    document.addEventListener('visibilitychange', () => {
      if (currentMood && document.visibilityState === 'visible') requestWakeLock();
    });

    let player = null;
    let playerReady = false;
    let currentMood = null;
    let stallTimer = null;
    let currentVideoId = null;
    const blockedVideos = new Set();

    function hidePlayer() {
      document.getElementById('playerWrap').classList.remove('show');
    }
    function showPlayer() {
      if (currentMood) document.getElementById('playerWrap').classList.add('show');
    }

    let loadingTimer = null;
    function showLoading() {
      document.getElementById('playerLoading').classList.remove('hidden');
      clearTimeout(loadingTimer);
      // Safety net: never let the overlay get stuck if PLAYING never fires
      // (e.g. autoplay blocked and the video needs a manual click)
      loadingTimer = setTimeout(hideLoading, 2500);
    }
    function hideLoading() {
      clearTimeout(loadingTimer);
      document.getElementById('playerLoading').classList.add('hidden');
    }

    function clearStall() {
      if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
    }

    function armStall() {
      clearStall();
      stallTimer = setTimeout(() => {
        // If still unstarted or cued after 5s, the video is blocked — skip it
        const state = player && player.getPlayerState();
        if (state === YT.PlayerState.UNSTARTED || state === YT.PlayerState.CUED || state === -1) {
          playNext();
        }
      }, 5000);
    }

    // Warm up the player with a muted placeholder as soon as it's ready, so
    // by the time the user clicks a mood, YouTube is already actively
    // playing (invisibly, muted) — a click then only has to unMute() and
    // swap videos, which is always allowed, instead of cold-starting
    // playback outside the user gesture (which Chrome can block).
    let primed = false;
    function tryPrime() {
      if (primed || !playerReady) return;
      const pool = Object.values(MOODS).flatMap(m => m.videos || []);
      if (!pool.length) return;
      primed = true;
      player.mute();
      player.loadVideoById(pool[Math.floor(Math.random() * pool.length)]);
    }

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        playerVars: { controls: 1, rel: 0, modestbranding: 1, playsinline: 1 },
        events: {
          onReady: () => { playerReady = true; tryPrime(); },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.ENDED) { clearStall(); playNext(); }
            else if (e.data === YT.PlayerState.PLAYING) { clearStall(); showPlayer(); hideLoading(); }
          },
          onError: () => {
            if (currentMood && currentVideoId) blockedVideos.add(currentVideoId);
            clearStall();
            if (currentMood) { playNext(); } else { primed = false; tryPrime(); }
          }
        }
      });
    };

    function getPool(mood) {
      const m = MOODS[mood];
      const all = m.sources ? m.sources.flatMap(s => MOODS[s].videos) : m.videos;
      return all.filter(id => !blockedVideos.has(id));
    }

    function playNext() {
      if (!currentMood) return;
      const videoId = nextFromQueue();
      if (!videoId) return;
      showLoading();
      currentVideoId = videoId;
      player.loadVideoById(videoId);
      armStall();
    }

    function loadPlayer(videoId) {
      showLoading();
      currentVideoId = videoId;
      if (playerReady) {
        player.loadVideoById(videoId);
        armStall();
      } else {
        const interval = setInterval(() => {
          if (playerReady) {
            clearInterval(interval);
            currentVideoId = videoId;
            player.loadVideoById(videoId);
            armStall();
          }
        }, 100);
      }
    }

    let queue = [];
    let recentlyPlayed = [];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildQueue(mood) {
      const pool = getPool(mood);
      const recent = new Set(recentlyPlayed);
      const shuffled = shuffle(pool);
      // Put recently-played videos at the back so they don't recur immediately
      const front = shuffled.filter(id => !recent.has(id));
      const back  = shuffled.filter(id =>  recent.has(id));
      queue = [...front, ...back];
    }

    function nextFromQueue() {
      if (queue.length === 0) buildQueue(currentMood);
      const id = queue.shift();
      recentlyPlayed.push(id);
      // Keep history to ~25% of the current pool size, minimum 3
      const limit = Math.max(3, Math.ceil(getPool(currentMood).length * 0.25));
      if (recentlyPlayed.length > limit) recentlyPlayed.shift();
      return id;
    }

    function positionPlayer(btn) {
      const playerWrap = document.getElementById('playerWrap');
      const buttonsEl = document.getElementById('buttons');
      const btns = Array.from(buttonsEl.querySelectorAll('[data-mood]'));
      const idx = btns.indexOf(btn);
      const rowEnd = (idx % 2 === 0 && btns[idx + 1]) ? btns[idx + 1] : btn;
      rowEnd.insertAdjacentElement('afterend', playerWrap);
      playerWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function onMoodClick(mood, btn) {
      if (mood !== currentMood) {
        currentMood = mood;
        recentlyPlayed = [];
        buildQueue(mood);
      }
      const videoId = nextFromQueue();
      if (!videoId) return;

      document.querySelectorAll('[data-mood]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.getElementById('hint').textContent = 'playing: ' + mood.toUpperCase();
      document.getElementById('playerTitle').textContent = mood.toUpperCase();

      positionPlayer(btn);
      showPlayer();

      if (player && player.unMute) player.unMute();
      requestWakeLock();
      loadPlayer(videoId);
    }

    // Close button hides player — no DOM move so the iframe doesn't reload
    document.getElementById('playerClose').addEventListener('click', () => {
      hidePlayer();
      document.querySelectorAll('[data-mood]').forEach(b => b.classList.remove('active'));
      document.getElementById('hint').innerHTML = '<a href="https://ben-schechter.com">created by ben schechter</a>';
      if (player && player.stopVideo) player.stopVideo();
      releaseWakeLock();
      currentMood = null;
    });
  </script>
</body>
</html>
