<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>moods</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }

    button {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.35);
      font-family: inherit;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 18px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      border-radius: 2px;
    }

    button:hover {
      border-color: rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.75);
    }

    button.active {
      border-color: rgba(255,255,255,0.7);
      color: #fff;
    }

    .player-wrap {
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16/9;
      background: #111;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .player-wrap.visible { opacity: 1; }

    #player {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .hint {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.15);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="buttons">
    <button data-mood="work">Work</button>
    <button data-mood="boost">Boost</button>
    <button data-mood="still">Still</button>
    <button data-mood="empty">Empty</button>
    <button data-mood="well">Well</button>
    <button data-mood="random">Random</button>
  </div>

  <div class="player-wrap" id="playerWrap">
    <div id="player"></div>
  </div>

  <span class="hint" id="hint">choose a mood</span>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const MOODS = {
      work: [
        'jfKfPfyJRdk', // Lofi Girl – 24/7 lofi hip hop
        'rUxyKA_okbc', // Marconi Union – Weightless (scientifically relaxing)
        'b_YHE4Sx-08', // Max Richter – On the Nature of Daylight
        '4Tr0otuiQuU', // Brian Eno – Ambient 1: Music for Airports
        'WPni755-Krg', // Deep Focus – no lyrics ambient
      ],
      boost: [
        'btPJPFnesV4', // Eminem – Lose Yourself
        'Y8HOfcYWZoo', // Daft Punk – Get Lucky
        '_E0PWQvVkWI', // Eye of the Tiger – Survivor
        'IcrbM1l_BoI', // Kendrick Lamar – m.A.A.d city
        'gCYcHz2k5x0', // High Energy Workout Mix
      ],
      still: [
        'J3OBjFMVG8U', // Bon Iver – Holocene
        'WKsJFBBGBkk', // Sufjan Stevens – Death With Dignity
        'aGSKrUooktg', // Sigur Rós – Hoppípolla
        'bfGCopP_JiU', // The National – Bloodbuzz Ohio
        'CvFH_6DNRCY', // Phoebe Bridgers – Motion Sickness
      ],
      empty: [
        'aMZ4QL0orw0', // Radiohead – Exit Music (For a Film)
        'b_YHE4Sx-08', // Max Richter – On the Nature of Daylight
        '4Tr0otuiQuU', // Brian Eno – Ambient 1
        'f02mOEt11OQ', // Nils Frahm – Says
        'KOzDU1DjkzE', // Stars of the Lid – Requiem for Dying Mothers
      ],
      well: [
        'bt2-OmOP2XM', // Van Morrison – Into the Mystic
        'YBcdt6vFNRA', // Fleet Foxes – Helplessness Blues
        'vY_hip8i_MY', // Iron & Wine – Naked As We Came
        'UmPyLFBpFRs', // Nick Drake – Pink Moon
        'ExIHkGNMHqo', // Bill Withers – Lean on Me
      ],
      random: [], // populated at runtime from all other moods
    };

    let player = null;
    let currentMood = null;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
        },
        events: { onReady: () => {} }
      });
    };

    function pickRandom(arr, exclude) {
      const pool = arr.filter(v => v !== exclude);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    let lastVideo = null;

    document.querySelectorAll('[data-mood]').forEach(btn => {
      btn.addEventListener('click', () => {
        const mood = btn.dataset.mood;
        const allVideos = Object.entries(MOODS)
          .filter(([k]) => k !== 'random')
          .flatMap(([, v]) => v);
        const videos = mood === 'random' ? allVideos : MOODS[mood];
        const videoId = pickRandom(videos, lastVideo);
        lastVideo = videoId;

        // Update active state
        document.querySelectorAll('[data-mood]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMood = mood;

        // Update hint
        document.getElementById('hint').textContent = mood;

        // Show player and load video
        document.getElementById('playerWrap').classList.add('visible');

        if (player && player.loadVideoById) {
          player.loadVideoById(videoId);
        }
      });
    });
  </script>
</body>
</html>
