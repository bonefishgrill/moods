<html lang="en">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000;
      --white: #fff;
    }

    /* Classic Mac desktop dot pattern */
    body {
      background-color: var(--white);
      background-image: radial-gradient(circle, #000 1px, transparent 1px);
      background-size: 8px 8px;
      font-family: 'VT323', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
      padding-bottom: 40px;
    }


    /* ── Window ── */
    .window {
      margin-top: 32px;
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      width: 100%;
      max-width: 680px;
      image-rendering: pixelated;
    }

    /* Classic Mac title bar — horizontal pinstripes */
    .title-bar {
      height: 20px;
      background: repeating-linear-gradient(
        to bottom,
        var(--white) 0px, var(--white) 1px,
        var(--black) 1px, var(--black) 2px
      );
      border-bottom: 2px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    .title-bar-title {
      background: var(--white);
      padding: 0 8px;
      font-size: 13px;
      font-family: 'VT323', 'Monaco', monospace;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .close-box {
      position: absolute;
      left: 6px;
      width: 11px;
      height: 11px;
      border: 1px solid var(--black);
      background: var(--white);
      cursor: pointer;
    }

    .close-box:hover {
      background: var(--black);
    }

    /* ── Window content ── */
    .window-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Mood buttons ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    button {
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow: 2px 2px 0 var(--black);
      color: var(--black);
      font-family: 'VT323', 'Monaco', monospace;
      font-size: 22px;
      letter-spacing: 0.04em;
      padding: 20px 14px 18px;
      cursor: pointer;
      transition: none;
      image-rendering: pixelated;
      text-transform: uppercase;
      text-align: left;
      line-height: 1.3;
    }

    button:hover {
      /* 50% dither pattern for hover state */
      background-image: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%);
      background-size: 2px 2px;
    }

    button:active,
    button.active {
      background: var(--black);
      color: var(--white);
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    /* Replace the browser's default blue focus ring with something that
       matches the monochrome look, instead of just removing it (which
       would break keyboard-only navigation) */
    button:focus { outline: none; }
    button:focus-visible {
      outline: 2px dashed var(--black);
      outline-offset: 2px;
    }

    /* ── Player window ── */
    .player-window {
      border: 2px solid transparent;
      box-shadow: 4px 4px 0 transparent;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .player-window.show {
      max-height: 640px;
      border-color: var(--black);
      box-shadow: 4px 4px 0 var(--black);
    }

    .player-title-bar {
      height: 18px;
      background: repeating-linear-gradient(
        to bottom,
        var(--white) 0px, var(--white) 1px,
        var(--black) 1px, var(--black) 2px
      );
      border-bottom: 2px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .player-title-bar .close-box {
      left: 5px;
      width: 10px;
      height: 10px;
    }

    .player-title-text {
      background: var(--white);
      padding: 0 6px;
      font-size: 12px;
      font-family: 'VT323', 'Monaco', monospace;
    }

    .player-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--black);
      position: relative;
    }

    /* Two player slots: whichever is "active" is visible; the other sits
       hidden, buffering whatever mood the user last hovered/touched, ready
       to be swapped in instantly on a matching click. */
    .player-slot {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
    }
    .player-slot.active { opacity: 1; pointer-events: auto; z-index: 1; }
    .player-slot iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Covers the active slot while it's loading, so YouTube's transient
       init error/placeholder is never visible */
    .player-loading {
      position: absolute;
      inset: 0;
      background: var(--black);
      z-index: 2;
      opacity: 1;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .player-loading.hidden { opacity: 0; }

    /* ── Status bar ── */
    .status-bar {
      border-top: 2px solid var(--black);
      padding: 4px 10px;
      font-size: 13px;
      font-family: 'VT323', 'Monaco', monospace;
      color: var(--black);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
    }

    /* ── Resize corner ── */
    .resize-corner {
      position: absolute;
      bottom: 0; right: 0;
      width: 12px; height: 12px;
      background: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%);
      background-size: 2px 2px;
    }
    #hint a {
      color: var(--black);
      text-decoration: none;
    }

    #hint a:hover {
      text-decoration: underline;
    }

    .hit-counter {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--black);
      letter-spacing: 0.1em;
    }

    /* Player spans both grid columns when inside the buttons grid */
    .player-window { grid-column: 1 / -1; }

    @media (max-width: 600px) {
      body { padding-top: 12px; padding-bottom: 20px; }
      .window { margin-top: 8px; }
      .window-content { padding: 10px; gap: 8px; }
      button { font-size: 14px; padding: 10px 8px 8px; line-height: 1.2; }
    }
  </style>
</head>
<body>


  <!-- Main window -->
  <div class="window">
    <div class="title-bar">
      <div class="close-box" onclick="location.href='https://ben-schechter.com'"></div>
      <span class="title-bar-title">Moods v1.0</span>
    </div>

    <div class="window-content">

      <div class="buttons" id="buttons">
        <!-- Player's DOM position never changes — repositioning it next to
             the clicked button is done with CSS `order` only (see
             positionPlayer), since moving this node would reload the
             iframes inside it and destroy any buffered video. -->
        <div class="player-window" id="playerWrap">
          <div class="player-title-bar">
            <div class="close-box" id="playerClose"></div>
            <span class="player-title-text" id="playerTitle">Now Playing</span>
          </div>
          <div class="player-wrap">
            <div class="player-slot active" id="slotA"><div id="playerA"></div></div>
            <div class="player-slot" id="slotB"><div id="playerB"></div></div>
            <div class="player-loading" id="playerLoading"></div>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <span id="hint"><a href="https://ben-schechter.com">created by ben schechter</a></span>
        <span class="hit-counter" id="visitCount"></span>
        <span id="clock"></span>
      </div>

    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let MOODS = {};

    fetch('playlists.json')
      .then(r => r.json())
      .then(data => {
        MOODS = data;
        const container = document.getElementById('buttons');
        Object.entries(MOODS).forEach(([mood, val], i) => {
          const btn = document.createElement('button');
          btn.dataset.mood = mood;
          btn.textContent = val.label;
          // Leaves odd order values free for the player to slot into after
          // whichever row was clicked (see positionPlayer) — purely visual,
          // no DOM move involved.
          btn.style.order = i * 2;
          btn.addEventListener('click', () => onMoodClick(mood, btn));
          btn.addEventListener('mouseenter', () => startPreload(mood));
          btn.addEventListener('touchstart', () => startPreload(mood), { passive: true });
          container.appendChild(btn);
        });
        tryPrimeActive();
      });

    // Visitor counter
    fetch('https://api.counterapi.dev/v1/moods-computer/visits/up')
      .then(r => r.json())
      .then(d => {
        const n = d.count + 696;
        document.getElementById('visitCount').textContent =
          'visitor count ' + String(n).padStart(6, '0');
      })
      .catch(() => {});

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Screen wake lock — keeps phone screen on while playing
    let wakeLock = null;

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
      }
    }

    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }

    // Re-acquire wake lock if page becomes visible again while playing
    document.addEventListener('visibilitychange', () => {
      if (currentMood && document.visibilityState === 'visible') requestWakeLock();
    });

    // Two player slots. "Active" is whichever is visible/audible; the other
    // sits hidden, buffering whichever mood the user last hovered/touched.
    // Real YouTube buffering always costs real network time — a previous
    // attempt to hide that by preloading all 12 moods at once made things
    // worse, since every video (including the one just clicked) had to
    // compete for bandwidth with 11 others buffering simultaneously. Hover
    // gives a real, specific signal of intent instead of guessing at all of
    // them, so only ever one extra video is buffering at a time.
    const players = { A: null, B: null };
    const playerReady = { A: false, B: false };
    let activeKey = 'A';
    let currentMood = null;
    let currentVideoId = null;
    let stallTimer = null;
    const queueByMood = {};
    const recentByMood = {};
    const blockedVideos = new Set();

    // What the (hidden) inactive slot is currently buffering, if anything.
    let preloadMood = null;
    let preloadVideoId = null;
    let preloadReady = false;
    let preloadStallTimer = null;

    function inactiveKey() { return activeKey === 'A' ? 'B' : 'A'; }
    function activePlayer() { return players[activeKey]; }

    function hidePlayer() {
      document.getElementById('playerWrap').classList.remove('show');
    }
    function showPlayer() {
      if (currentMood) document.getElementById('playerWrap').classList.add('show');
    }

    let loadingTimer = null;
    function showLoading() {
      document.getElementById('playerLoading').classList.remove('hidden');
      clearTimeout(loadingTimer);
      // Safety net: never let the overlay get stuck if PLAYING never fires
      // (e.g. autoplay blocked and the video needs a manual click)
      loadingTimer = setTimeout(hideLoading, 2500);
    }
    function hideLoading() {
      clearTimeout(loadingTimer);
      document.getElementById('playerLoading').classList.add('hidden');
    }

    function clearStall() {
      if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
    }
    function armStall() {
      clearStall();
      stallTimer = setTimeout(() => {
        // If still unstarted or cued after 5s, the video is blocked — skip it
        const state = activePlayer() && activePlayer().getPlayerState();
        if (state === YT.PlayerState.UNSTARTED || state === YT.PlayerState.CUED || state === -1) {
          playNext();
        }
      }, 5000);
    }

    function clearPreloadStall() {
      if (preloadStallTimer) { clearTimeout(preloadStallTimer); preloadStallTimer = null; }
    }
    function armPreloadStall() {
      clearPreloadStall();
      preloadStallTimer = setTimeout(() => {
        const key = inactiveKey();
        const state = players[key] && players[key].getPlayerState();
        if (state === YT.PlayerState.UNSTARTED || state === YT.PlayerState.CUED || state === -1) {
          const m = preloadMood;
          preloadMood = null;
          if (m) startPreload(m);
        }
      }, 8000);
    }

    // Warm up the initially-active slot with a muted placeholder as soon as
    // it's ready, so even a click with no prior hover (e.g. a fast tap on
    // mobile) still gets gesture-safe autoplay instead of cold-starting
    // playback outside the user gesture (which Chrome can block).
    let activePrimed = false;
    function tryPrimeActive() {
      if (activePrimed || !playerReady[activeKey]) return;
      const pool = Object.values(MOODS).flatMap(m => m.videos || []);
      if (!pool.length) return;
      activePrimed = true;
      players[activeKey].mute();
      players[activeKey].loadVideoById(pool[Math.floor(Math.random() * pool.length)]);
    }

    // Called on mouseenter/touchstart of a mood button — starts buffering a
    // candidate video (muted) in the hidden slot, so if the user actually
    // clicks that same mood, it can be swapped in instead of loaded fresh.
    function startPreload(mood) {
      if (mood === currentMood || mood === preloadMood) return;
      const key = inactiveKey();
      if (!playerReady[key]) return;
      preloadMood = mood;
      preloadReady = false;
      const videoId = nextFromQueue(mood);
      if (!videoId) { preloadMood = null; return; }
      preloadVideoId = videoId;
      players[key].mute();
      players[key].loadVideoById(videoId);
      armPreloadStall();
    }

    function createPlayer(key) {
      players[key] = new YT.Player('player' + key, {
        height: '100%',
        width: '100%',
        playerVars: { controls: 1, rel: 0, modestbranding: 1, playsinline: 1 },
        events: {
          onReady: () => {
            playerReady[key] = true;
            if (key === activeKey) tryPrimeActive();
          },
          onStateChange: (e) => {
            const isActive = key === activeKey;
            if (e.data === YT.PlayerState.PLAYING) {
              if (isActive) { clearStall(); showPlayer(); hideLoading(); }
              else { clearPreloadStall(); preloadReady = true; }
            } else if (e.data === YT.PlayerState.ENDED && isActive) {
              clearStall(); playNext();
            }
          },
          onError: () => {
            const isActive = key === activeKey;
            if (isActive) {
              if (currentVideoId) blockedVideos.add(currentVideoId);
              clearStall();
              if (currentMood) playNext(); else { activePrimed = false; tryPrimeActive(); }
            } else {
              if (preloadVideoId) blockedVideos.add(preloadVideoId);
              clearPreloadStall();
              const m = preloadMood;
              preloadMood = null;
              if (m) startPreload(m);
            }
          }
        }
      });
    }

    window.onYouTubeIframeAPIReady = function() {
      createPlayer('A');
      createPlayer('B');
    };

    function getPool(mood) {
      const m = MOODS[mood];
      const all = m.sources ? m.sources.flatMap(s => MOODS[s].videos) : m.videos;
      return all.filter(id => !blockedVideos.has(id));
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildQueue(mood) {
      const pool = getPool(mood);
      const recent = new Set(recentByMood[mood] || []);
      const shuffled = shuffle(pool);
      // Put recently-played videos at the back so they don't recur immediately
      const front = shuffled.filter(id => !recent.has(id));
      const back  = shuffled.filter(id =>  recent.has(id));
      queueByMood[mood] = [...front, ...back];
    }

    function nextFromQueue(mood) {
      if (!queueByMood[mood] || queueByMood[mood].length === 0) buildQueue(mood);
      const id = queueByMood[mood].shift();
      if (!id) return id;
      const recent = recentByMood[mood] || (recentByMood[mood] = []);
      recent.push(id);
      // Keep history to ~25% of the current pool size, minimum 3
      const limit = Math.max(3, Math.ceil(getPool(mood).length * 0.25));
      if (recent.length > limit) recent.shift();
      return id;
    }

    function playNext() {
      if (!currentMood) return;
      const videoId = nextFromQueue(currentMood);
      if (!videoId) return;
      showLoading();
      currentVideoId = videoId;
      activePlayer().loadVideoById(videoId);
      armStall();
    }

    // Moving a DOM node that contains an iframe — even just reordering it
    // among existing siblings via insertAdjacentElement — reloads the
    // iframe from scratch in most browsers (this is a known, previously
    // hit issue in this file: see the "Fix player iframe reload" commit).
    // That reload was silently destroying every bit of preloaded/buffered
    // video on every single click, regardless of any preloading logic.
    // Instead, the player element's DOM position never changes again —
    // only its CSS `order` does, which is purely visual within the grid.
    function positionPlayer(btn) {
      const playerWrap = document.getElementById('playerWrap');
      const buttonsEl = document.getElementById('buttons');
      const btns = Array.from(buttonsEl.querySelectorAll('[data-mood]'));
      const idx = btns.indexOf(btn);
      const rowIndex = Math.floor(idx / 2);
      playerWrap.style.order = rowIndex * 2 + 1;
      playerWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function onMoodClick(mood, btn) {
      document.querySelectorAll('[data-mood]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('hint').textContent = 'playing: ' + mood.toUpperCase();
      document.getElementById('playerTitle').textContent = mood.toUpperCase();

      positionPlayer(btn);
      currentMood = mood;
      showPlayer();
      requestWakeLock();

      if (mood === preloadMood) {
        // Promote the hidden slot to active — whether its video has
        // already finished buffering (instant) or is still mid-flight, this
        // reuses that work instead of starting a redundant fresh load.
        const oldKey = activeKey;
        const newKey = inactiveKey();
        document.getElementById('slot' + oldKey).classList.remove('active');
        document.getElementById('slot' + newKey).classList.add('active');
        activeKey = newKey;
        players[oldKey].mute();
        currentVideoId = preloadVideoId;
        const wasReady = preloadReady;
        preloadMood = null; preloadVideoId = null; preloadReady = false;
        clearPreloadStall();
        players[newKey].unMute();
        if (wasReady) { hideLoading(); players[newKey].playVideo(); }
        else { showLoading(); }
        armStall();
        return;
      }

      // No relevant preload — fresh load on the currently active slot
      const videoId = nextFromQueue(mood);
      if (!videoId) return;
      currentVideoId = videoId;
      showLoading();
      const key = activeKey;
      if (playerReady[key]) {
        players[key].unMute();
        players[key].loadVideoById(videoId);
        armStall();
      } else {
        const interval = setInterval(() => {
          if (playerReady[key]) {
            clearInterval(interval);
            players[key].unMute();
            players[key].loadVideoById(videoId);
            armStall();
          }
        }, 100);
      }
    }

    // Close button hides player — no DOM move so the iframe doesn't reload
    document.getElementById('playerClose').addEventListener('click', () => {
      hidePlayer();
      document.querySelectorAll('[data-mood]').forEach(b => b.classList.remove('active'));
      document.getElementById('hint').innerHTML = '<a href="https://ben-schechter.com">created by ben schechter</a>';
      clearStall();
      if (activePlayer() && activePlayer().stopVideo) activePlayer().stopVideo();
      releaseWakeLock();
      currentMood = null;
    });
  </script>
</body>
</html>
