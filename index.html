<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moods</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #000;
      --white: #fff;
    }

    /* Classic Mac desktop dot pattern */
    body {
      background-color: var(--white);
      background-image: radial-gradient(circle, #000 1px, transparent 1px);
      background-size: 8px 8px;
      font-family: 'VT323', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 24px;
      padding-bottom: 40px;
    }

    /* ── Menu bar ── */
    .menu-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 20px;
      background: var(--white);
      border-bottom: 1px solid var(--black);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 20px;
      font-size: 13px;
      z-index: 100;
      image-rendering: pixelated;
    }

    .menu-bar .apple { font-size: 14px; }
    .menu-bar span { cursor: default; white-space: nowrap; }
    .menu-bar span:hover { background: var(--black); color: var(--white); padding: 0 4px; }

    /* ── Window ── */
    .window {
      margin-top: 32px;
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      width: 100%;
      max-width: 680px;
      image-rendering: pixelated;
    }

    /* Classic Mac title bar — horizontal pinstripes */
    .title-bar {
      height: 20px;
      background: repeating-linear-gradient(
        to bottom,
        var(--white) 0px, var(--white) 1px,
        var(--black) 1px, var(--black) 2px
      );
      border-bottom: 2px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
    }

    .title-bar-title {
      background: var(--white);
      padding: 0 8px;
      font-size: 13px;
      font-family: 'VT323', 'Monaco', monospace;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .close-box {
      position: absolute;
      left: 6px;
      width: 11px;
      height: 11px;
      border: 1px solid var(--black);
      background: var(--white);
      cursor: pointer;
    }

    .close-box:hover {
      background: var(--black);
    }

    /* ── Window content ── */
    .window-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Mood buttons ── */
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    button {
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow: 2px 2px 0 var(--black);
      color: var(--black);
      font-family: 'VT323', 'Monaco', monospace;
      font-size: 16px;
      letter-spacing: 0.04em;
      padding: 12px 10px 10px;
      cursor: pointer;
      transition: none;
      image-rendering: pixelated;
      text-transform: uppercase;
      text-align: left;
      line-height: 1.2;
    }

    button:hover {
      /* 50% dither pattern for hover state */
      background-image: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%);
      background-size: 2px 2px;
    }

    button:active,
    button.active {
      background: var(--black);
      color: var(--white);
      box-shadow: none;
      transform: translate(2px, 2px);
    }

    /* ── Player window ── */
    .player-window {
      border: 2px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      overflow: hidden;
      display: none;
    }

    .player-window.visible { display: block; }

    .player-title-bar {
      height: 18px;
      background: repeating-linear-gradient(
        to bottom,
        var(--white) 0px, var(--white) 1px,
        var(--black) 1px, var(--black) 2px
      );
      border-bottom: 2px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .player-title-bar .close-box {
      left: 5px;
      width: 10px;
      height: 10px;
    }

    .player-title-text {
      background: var(--white);
      padding: 0 6px;
      font-size: 12px;
      font-family: 'VT323', 'Monaco', monospace;
    }

    .player-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--black);
      position: relative;
    }

    #player {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Status bar ── */
    .status-bar {
      border-top: 2px solid var(--black);
      padding: 4px 10px;
      font-size: 13px;
      font-family: 'VT323', 'Monaco', monospace;
      color: var(--black);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
    }

    /* ── Resize corner ── */
    .resize-corner {
      position: absolute;
      bottom: 0; right: 0;
      width: 12px; height: 12px;
      background: repeating-conic-gradient(#000 0% 25%, #fff 0% 50%);
      background-size: 2px 2px;
    }
  </style>
</head>
<body>

  <!-- Classic Mac menu bar -->
  <div class="menu-bar">
    <span class="apple">&#63743;</span>
    <span><b>Moods</b></span>
    <span>File</span>
    <span>Edit</span>
    <span>View</span>
  </div>

  <!-- Main window -->
  <div class="window">
    <div class="title-bar">
      <div class="close-box"></div>
      <span class="title-bar-title">Moods v1.0</span>
    </div>

    <div class="window-content">

      <div class="buttons">
        <button data-mood="work">I need to work — something quiet and calming</button>
        <button data-mood="boost">I need energy — I'm tired and need a boost</button>
        <button data-mood="still">I feel the weight of the world and watch the snow come down</button>
        <button data-mood="empty">I'm feeling empty</button>
        <button data-mood="well">All is well and everything shall be well</button>
        <button data-mood="random">Random</button>
      </div>

      <!-- Player as its own Mac window -->
      <div class="player-window" id="playerWrap">
        <div class="player-title-bar">
          <div class="close-box" id="playerClose"></div>
          <span class="player-title-text" id="playerTitle">Now Playing</span>
        </div>
        <div class="player-wrap">
          <div id="player"></div>
        </div>
      </div>

      <div class="status-bar">
        <span id="hint">Select a mood to begin</span>
        <span id="clock"></span>
      </div>

    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const MOODS = {
      work: [
        's--IkNqI9og',
        'Xw5AiRVqfqk',
        'ftrNgYHxS30',
        'C-yhzrCFsA0',
        '09B2gn5OhKg',
        'xwLTFyMsXrY',
        'q86g1aop6a8',
        'ZJSuKb8YAYI',
        'TSXxP1GN9Nk',
        'jfKfPfyJRdk',
        'rUxyKA_okbc',
        'b_YHE4Sx-08',
        '4Tr0otuiQuU',
        'WPni755-Krg',
      ],
      boost: [
        'v3aO2jM-66A',
        'btPJPFnesV4',
        'Y8HOfcYWZoo',
        '_E0PWQvVkWI',
        'IcrbM1l_BoI',
        'gCYcHz2k5x0',
      ],
      still: [
        'J3OBjFMVG8U',
        'WKsJFBBGBkk',
        'aGSKrUooktg',
        'bfGCopP_JiU',
        'CvFH_6DNRCY',
      ],
      empty: [
        'aMZ4QL0orw0',
        'b_YHE4Sx-08',
        '4Tr0otuiQuU',
        'f02mOEt11OQ',
        'KOzDU1DjkzE',
      ],
      well: [
        'bt2-OmOP2XM',
        'YBcdt6vFNRA',
        'vY_hip8i_MY',
        'UmPyLFBpFRs',
        'ExIHkGNMHqo',
      ],
      random: [],
    };

    // Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    let player = null;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        playerVars: { autoplay: 1, controls: 1, rel: 0, modestbranding: 1 },
        events: { onReady: () => {} }
      });
    };

    function pickRandom(arr, exclude) {
      const pool = arr.filter(v => v !== exclude);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    let lastVideo = null;

    document.querySelectorAll('[data-mood]').forEach(btn => {
      btn.addEventListener('click', () => {
        const mood = btn.dataset.mood;
        const allVideos = Object.entries(MOODS)
          .filter(([k]) => k !== 'random')
          .flatMap(([, v]) => v);
        const videos = mood === 'random' ? allVideos : MOODS[mood];
        const videoId = pickRandom(videos, lastVideo);
        lastVideo = videoId;

        document.querySelectorAll('[data-mood]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        document.getElementById('hint').textContent = 'Playing: ' + mood.toUpperCase();
        document.getElementById('playerTitle').textContent = mood.toUpperCase();
        document.getElementById('playerWrap').classList.add('visible');

        if (player && player.loadVideoById) player.loadVideoById(videoId);
      });
    });

    // Close button hides player
    document.getElementById('playerClose').addEventListener('click', () => {
      document.getElementById('playerWrap').classList.remove('visible');
      document.querySelectorAll('[data-mood]').forEach(b => b.classList.remove('active'));
      document.getElementById('hint').textContent = 'Select a mood to begin';
      if (player && player.stopVideo) player.stopVideo();
    });
  </script>
</body>
</html>
